<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Geometry Book Creator & Lab</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0f1d;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(135deg, #050b14 0%, #111827 100%);
            color: #ffffff;
            font-family: 'SolaimanLipi', 'Poppins', sans-serif;
            overflow-y: auto;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 25px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        #docs-content-area {
            min-height: 350px;
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'SolaimanLipi', sans-serif !important; 
            border-radius: 12px;
            padding: 25px;
            overflow-x: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            line-height: 1.6;
        }

        #docs-content-area h2, #docs-content-area h3, #docs-content-area p, #docs-content-area div { 
            font-family: 'SolaimanLipi', sans-serif !important; 
        }
        
        #docs-content-area h2, #docs-content-area h3 { color: #0056b3; margin-top: 20px;}
        #docs-content-area img, #docs-content-area video { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; }

        /* MCQ Styles */
        .mcq-card { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; padding: 15px; background: #fdfdfd; box-shadow: 0 4px 6px rgba(0,0,0,0.02); font-family: 'SolaimanLipi', sans-serif !important; }
        .mcq-question { font-weight: 600; color: #2c3e50; font-size: 1.1rem; margin-bottom: 15px; }
        .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 1rem; color: #34495e; }
        details > summary { list-style: none; color: #e74c3c; font-weight: 600; cursor: pointer; display: inline-block; padding: 5px 10px; background: #fbecec; border-radius: 5px; transition: 0.3s;}
        details > summary:hover { background: #fadbd8; }
        details > summary::-webkit-details-marker { display: none; }
        .mcq-answer { margin-top: 10px; padding: 15px; background: #e8f8f5; border-left: 4px solid #1abc9c; border-radius: 4px; font-size: 0.95rem; color: #16a085; }

        #canvas-container {
            width: 100%; height: 400px; border-radius: 16px; background: #000;
            position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .custom-slider { width: 100%; accent-color: var(--neon-blue); }
        
        .nav-btn {
            width: 100%; text-align: left; margin-bottom: 8px; border-radius: 10px;
            background: rgba(255,255,255,0.05); color: white; padding: 10px 12px; 
            border: 1px solid transparent; font-size: 0.85rem; transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .nav-btn.active { background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); color: #000; font-weight: 600; border-color: white; box-shadow: 0 0 15px rgba(0,242,255,0.4); }

        .coord-overlay { position: absolute; background: rgba(255,0,60,0.9); color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; pointer-events: none; z-index: 10; box-shadow: 0 0 10px rgba(255,0,60,0.5); }
        
        .form-control-dark { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-5">
        <h1 style="color: var(--neon-blue); font-weight: 700; font-family: 'Poppins', sans-serif; text-shadow: 0 0 15px rgba(0,242,255,0.4);">Interactive 3D Geometry Explorer</h1>
        <p class="text-light opacity-75">Mensuration Visualization, Real-time Analysis & Automated Book Publishing</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="glass-card text-center">
                <div id="canvas-container">
                    <div id="laser-tag" class="coord-overlay" style="display:none;"></div>
                </div>
                <div class="mt-4 p-3 rounded" style="background: rgba(0,242,255,0.05); border: 1px solid rgba(0,242,255,0.2);">
                    <div id="formula-display" class="h5 mb-0" style="color: var(--neon-blue); font-family: 'Poppins', sans-serif;"></div>
                </div>
                
                <div class="row mt-4 text-start bg-dark p-3 rounded mx-1" style="border: 1px solid var(--glass-border);">
                    <div class="col-6">
                        <label class="small text-info fw-bold">Rotate X-Axis (h): <span id="h-val" class="text-white">0</span></label>
                        <input type="range" class="custom-slider mt-2" id="sliderH" min="-180" max="180" step="1" value="0" oninput="updateFromSlider()">
                    </div>
                    <div class="col-6">
                        <label class="small text-info fw-bold">Rotate Y-Axis (k): <span id="k-val" class="text-white">0</span></label>
                        <input type="range" class="custom-slider mt-2" id="sliderK" min="-180" max="180" step="1" value="0" oninput="updateFromSlider()">
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <h5 class="text-info mb-3" style="font-family: 'SolaimanLipi', sans-serif;">📖 Book Details (বইয়ের তথ্য)</h5>
                <input type="text" id="bookTitle" class="form-control form-control-dark mb-2" placeholder="Book Title (e.g., Advanced 3D Geometry)">
                <input type="text" id="authorName" class="form-control form-control-dark mb-3" value="Shahjahan Ali, Mathematics-Dhaka University" placeholder="Author Name">
                
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-danger flex-grow-1 fw-bold" onclick="exportPDF()">📕 Publish PDF Book</button>
                    <button class="btn btn-primary flex-grow-1 fw-bold" onclick="exportWord()">📘 Export as Word</button>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="glass-card">
                <h5 class="mb-3 text-white border-bottom border-secondary pb-2">🎯 Select 3D/2D Object</h5>
                <div class="row g-2">
                    <div class="col-6 col-md-3"><button class="nav-btn active" onclick="setMode('sphere', this)">🌍 Sphere</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('pyramid', this)">⛺ Pyramid</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('prism', this)">💎 Prism</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('cuboid', this)">🧱 Cuboid</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('cube', this)">🧊 Cube</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('cylinder', this)">🛢️ Cylinder</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('cone', this)">🍦 Cone</button></div>
                    <div class="col-6 col-md-3"><button class="nav-btn" onclick="setMode('parallelogram', this)">▱ Parallelogram</button></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
                    <h5 class="text-info m-0">📄 Chapter Content</h5>
                    <div>
                        <button class="btn btn-sm btn-outline-info fw-bold" onclick="addSmartMedia()">🔗 Add Media/Link</button>
                    </div>
                </div>
                
                <div id="docs-content-area" contenteditable="true">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    var mode = 'sphere'; 
    var p = { h: 0, k: 0 }; 
    var animSpeed = 0; 
    
    function generateMCQ(qNo, question, optA, optB, optC, optD, correctAns, explanation) {
        return `
        <div class="mcq-card">
            <div class="mcq-question">${qNo}. ${question}</div>
            <div class="mcq-options">
                <div>ক) ${optA}</div> <div>খ) ${optB}</div>
                <div>গ) ${optC}</div> <div>ঘ) ${optD}</div>
            </div>
            <details>
                <summary>👁️ উত্তর ও ব্যাখ্যা দেখুন</summary>
                <div class="mcq-answer">
                    <b>সঠিক উত্তর:</b> ${correctAns}<br><br>
                    <b>বিশ্লেষণ:</b> ${explanation}
                </div>
            </details>
        </div>`;
