<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vocabulary Quiz Lesson 5 - Proking</title>
    <style>
        :root {
            --primary: #10b981;
            --secondary: #06b6d4;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(6, 182, 212, 0.1) 0, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Vocabulary Section */
        .study-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .study-panel h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .sentence-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        @media (min-width: 768px) {
            .sentence-grid { grid-template-columns: 1fr 1fr; }
        }

        .sentence-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            border-left: 4px solid var(--secondary);
            transition: 0.2s;
        }

        .sentence-card:hover { background: rgba(255, 255, 255, 0.08); }
        .highlight { color: var(--accent); font-weight: bold; }

        /* Quiz Container */
        #quiz-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .q-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: #94a3b8; font-weight: 600; }
        .progress-wrap { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: 0.4s; }

        .question-text { font-size: 20px; margin-bottom: 25px; line-height: 1.4; min-height: 60px; }
        .options-grid { display: grid; gap: 12px; }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .opt-btn:hover:not([disabled]) { background: rgba(16, 185, 129, 0.2); border-color: var(--primary); }
        .correct { background: #059669 !important; border-color: #059669; }
        .wrong { background: #dc2626 !important; border-color: #dc2626; }

        #result-screen { text-align: center; display: none; }
        .final-score { font-size: 55px; font-weight: bold; color: var(--accent); margin: 20px 0; }
        .restart-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 17px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="study-panel">
    <h2>Lesson 5 Vocabulary Sentences</h2>
    <div class="sentence-grid" id="sentence-box"></div>
</div>

<div id="quiz-container">
    <div id="quiz-main">
        <div class="q-header">
            <span id="q-number">Question: 1/12</span>
            <span id="score-display">Score: 0</span>
        </div>
        <div class="progress-wrap"><div id="progress-fill"></div></div>
        
        <div id="q-content">
            <div class="question-text" id="q-text">Loading...</div>
            <div class="options-grid" id="opt-container"></div>
        </div>
    </div>

    <div id="result-screen">
        <h2>Quiz Completed!</h2>
        <div class="final-score" id="final-pts">0</div>
        <p id="msg" style="margin-bottom: 25px;"></p>
        <button class="restart-btn" onclick="location.reload()">Start Over</button>
    </div>
</div>

<script>
    const lessonData = [
        "Along: We walked along the river bank. (আমরা নদীর পাড় বরাবর হাঁটলাম।)",
        "Appropriate: Wear appropriate clothes for the party. (পার্টি জন্য সঠিক পোশাক পরো।)",
        "Believe: I believe in honesty. (আমি সততায় বিশ্বাস করি।)",
        "Choose: You can choose any color you like. (তুমি তোমার পছন্দমতো যেকোনো রঙ বাছাই করতে পারো।)",
        "Cleaner: The cleaner cleans our office every morning. (পরিচ্ছন্নতাকর্মী প্রতিদিন সকালে আমাদের অফিস পরিষ্কার করেন।)",
        "Describe: Can you describe your new house? (তুমি কি তোমার নতুন বাড়ির বর্ণনা দিতে পারবে।)",
        "Dirty: Don't play with dirty hands. (নোংরা হাতে খেলো না।)",
        "In front of: Park the car in front of the gate. (গেটের সামনে গাড়িটি পার্ক করো।)",
        "Mind: Would you mind closing the window? (তুমি কি জানালাটি বন্ধ করতে কিছু মনে করবে।)",
        "Occupation: What is your father's occupation? (তোমার বাবার পেশা কী?)",
        "Pile: There is a pile of books on the table. (টেবিলের ওপর এক স্তূপ বই আছে।)",
        "Realize: I realize my mistake now. (আমি এখন আমার ভুল বুঝতে পারছি।)",
        "Rubbish: Put the rubbish in the bin. (আবর্জনাগুলো ঝুড়িতে ফেলো।)",
        "Suitable: This dress is suitable for summer. (এই পোশাকটি গরমকালের জন্য উপযুক্ত।)",
        "Take out: Please take out your notebook. (দয়া করে তোমার নোটবুকটি বের করো।)",
        "Trouble: I don't want to give you any trouble. (আমি তোমাকে কোনো সমস্যায় ফেলতে চাই না।)",
        "Turn into: Water can turn into ice. (পানি বরফে পরিণত হতে পারে।)",
        "Unhygienic: Eating open food is unhygienic. (খোলা খাবার খাওয়া অস্বাস্থ্যকর।)",
        "Waitress: The waitress was very polite. (খাবার পরিবেশিকা খুব বিনয়ী ছিলেন।)",
        "Wake up: I wake up at 6 AM every day. (আমি প্রতিদিন সকাল ৬টায় ঘুম থেকে উঠি।)",
        "After: We will play after school. (আমরা স্কুলের পরে খেলব।)",
        "Bread: I like to eat bread and jam. (আমি রুটি এবং জ্যাম খেতে পছন্দ করি।)",
        "Careful: Be careful while crossing the road. (রাস্তা পার হওয়ার সময় সতর্ক থেকো।)",
        "Cheese: Do you like cheese on your pizza? (তুমি কি তোমার পিজ্জাতে পনির পছন্দ করো।)",
        "Cucumber: I often put cucumber in my salad. (আমি প্রায়ই সালাদে শসা দেই।)",
        "Each: Each student got a prize. (প্রত্যেক শিক্ষার্থী একটি করে পুরস্কার পেল।)",
        "Extra: I have an extra pen for you. (তোমার জন্য আমার কাছে একটি অতিরিক্ত কলম আছে।)",
        "Filling: The sandwich filling is very tasty. (স্যান্ডউইচের পুরটি খুব সুস্বাদু।)",
        "Later: I will call you later. (আমি তোমাকে পরে কল দেব।)",
        "Mustard: Mustard oil is good for health. (সরিষার তেল স্বাস্থ্যের জন্য ভালো।)",
        "Prepare: My mother will prepare lunch for us. (আমার মা আমাদের জন্য দুপুরের খাবার প্রস্তুত করবেন।)",
        "Serve: Always serve food with a smile. (সবসময় হাসিমুখে খাবার পরিবেশন করো।)",
        "Slice: Give me a slice of cake. (আমাকে এক ফালি কেক দাও।)",
        "Spread: Spread some butter on the bread. (রুটির ওপর কিছুটা মাখন ছড়িয়ে দাও।)",
        "Then: First wash your hands, then eat. (আগে হাত ধোও, তারপর খাও।)",
        "Thinly: Cut the onions thinly. (পেঁয়াজগুলো পাতলা করে কাটো।)",
        "Variety: We saw a variety of flowers in the garden. (আমরা বাগানে নানা ধরনের ফুল দেখলাম।)"
    ];

    const quizSet = [
        { q: "What is the synonym of 'Believe'?", a: "Trust", o: ["Doubt", "Trust", "Refuse", "Ignore"] },
        { q: "'Describe' শব্দটির বাংলা অর্থ কী?", a: "বর্ণনা করা", o: ["গল্প করা", "লুকানো", "বর্ণনা করা", "পরিষ্কার করা"] },
        { q: "Antonym of 'Dirty' is:", a: "Spotless", o: ["Filthy", "Messy", "Spotless", "Unhygienic"] },
        { q: "What is the Noun form of 'Prepare'?", a: "Preparation", o: ["Prepared", "Prepare", "Preparing", "Preparation"] },
        { q: "Which word means 'পেশা'?", a: "Occupation", o: ["Hobby", "Occupation", "Pastime", "Leisure"] },
        { q: "Complete: 'Put the ______ in the bin.'", a: "rubbish", o: ["treasure", "rubbish", "pile", "slice"] },
        { q: "Antonym of 'Careful' is:", a: "Reckless", o: ["Alert", "Cautious", "Reckless", "Safe"] },
        { q: "Which word is a synonym of 'Slice'?", a: "Portion", o: ["Whole", "Portion", "Entire", "Full"] },
        { q: "What is the female form of 'Waiter'?", a: "Waitress", o: ["Waitress", "Cleaner", "Server", "Nurse"] },
        { q: "'Unhygienic' এর বিপরীত শব্দ কোনটি?", a: "Healthy", o: ["Dirty", "Healthy", "Unclean", "Messy"] },
        { q: "Which one means 'পরিবর্তিত হওয়া'?", a: "Turn into", o: ["Take out", "Turn into", "Wake up", "Pick up"] },
        { q: "How should onions be cut?", a: "Thinly", o: ["Thickly", "Heavily", "Thinly", "Roughly"] }
    ];

    const box = document.getElementById('sentence-box');
    lessonData.forEach(s => {
        const d = document.createElement('div');
        d.className = 'sentence-card';
        const parts = s.split(':');
        d.innerHTML = `<span class="highlight">${parts[0]}:</span>${parts[1]}`;
        box.appendChild(d);
    });

    let idx = 0; let score = 0;

    function showQ() {
        const q = quizSet[idx];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-number').innerText = `Question: ${idx + 1}/${quizSet.length}`;
        document.getElementById('progress-fill').style.width = `${((idx + 1) / quizSet.length) * 100}%`;
        
        const cont = document.getElementById('opt-container');
        cont.innerHTML = '';
        q.o.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o;
            b.onclick = () => check(o, b);
            cont.appendChild(b);
        });
    }

    function check(sel, b) {
        const correct = quizSet[idx].a;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(btn => btn.disabled = true);

        if(sel === correct) {
            score += 10;
            b.classList.add('correct');
        } else {
            score -= 2;
            b.classList.add('wrong');
            btns.forEach(btn => { if(btn.innerText === correct) btn.classList.add('correct'); });
        }
        document.getElementById('score-display').innerText = `Score: ${score}`;

        setTimeout(() => {
            idx++;
            if(idx < quizSet.length) showQ();
            else end();
        }, 1200);
    }

    function end() {
        document.getElementById('quiz-main').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-pts').innerText = score;
        document.getElementById('msg').innerText = score > 90 ? "Legendary Performance, Proking! 🏆" : "Good Job! Keep practicing.";
    }

    showQ();
</script>
</body>
</html>
